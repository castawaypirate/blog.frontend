<div class="container">
    <div class="user-panel">
        <div class="search-container">
            <textarea id="user-search" placeholder="search user here..." rows="1"></textarea>
        </div>
        <div id="users-list" class="users-list">
        </div>
    </div>
    <div class="vertical-divider"></div>
    <div class="conversation-panel" id="conversation-panel">
        <div id="messages-display-area">
            <div class="message-placeholder">select a user to start messaging</div>
        </div>
        <div class="chat-input-area" id="chat-input-area" style="display: none;">
            <textarea id="message-input" placeholder="type your message here..." rows="1"></textarea>
            <button id="send-button">send</button>
        </div>
    </div>
</div>
